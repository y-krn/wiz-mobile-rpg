<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Neon Dungeon" />
    <meta name="theme-color" content="#0c0c0e" />
    <!-- PWA manifest & app icons -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="google-site-verification" content="-NlBrfHCXojEd6yPaPd9aLFBRZxXmvqD-yn1B4adm80" />
    <title>Wiz-Mobile: Neon Dungeon</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="game-container">
      <!-- Top HUD -->
      <header id="game-header">
        <span id="location-label">リルガミンの街</span>
        <span id="material-counter">メタ素材: 0</span>
        <button id="btn-mute" class="btn btn-mute sound-on" title="ミュート切替">🎵 ON</button>
      </header>

      <!-- Goal HUD -->
      <div id="goal-banner">
        <!-- Will be populated dynamically in ui.js -->
      </div>
      <div id="floor-entry-stinger" class="floor-entry-stinger" role="status" aria-live="polite" aria-atomic="true"></div>

      <!-- 3D Canvas viewport -->
      <div id="viewport-panel">
        <canvas id="dungeon-canvas"></canvas>
        <div id="records-strip" class="records-strip" aria-label="潜行記録"></div>
        <!-- Text HUD representation of surrounding walls for accessibility & navigation -->
        <div id="viewport-hud" aria-live="polite"></div>
        <div id="combat-overlay" class="combat-overlay-container" style="display: none;"></div>
        <div id="result-overlay" class="result-overlay-container" style="display: none;"></div>
      </div>

      <!-- Equip overlay (moved outside viewport for full game area layout) -->
      <div id="equip-overlay" class="equip-overlay-container" style="display: none;"></div>

      <!-- Spell overlay (moved outside viewport for full game area layout) -->
      <div id="spell-overlay" class="spell-overlay-container" style="display: none;"></div>

      <!-- Archives overlay -->
      <div id="archives-overlay" class="archives-overlay-container" style="display: none;"></div>

      <!-- Log Messages -->
      <div id="log-panel">
        <button id="btn-log-expand" title="全ログを表示" aria-label="全ログを表示">⛶</button>
        <div id="log-content"></div>
      </div>

      <!-- Full-log overlay (expanded from #btn-log-expand) -->
      <div id="log-overlay" class="log-overlay-container" style="display: none;">
        <div class="log-overlay-header">
          <span class="log-overlay-title">冒険の記録</span>
          <button id="btn-log-overlay-close" class="btn btn-neon">閉じる</button>
        </div>
        <div id="log-overlay-body" class="log-overlay-body"></div>
      </div>

      <!-- Controls Panel (Grid) -->
      <div id="controls-panel">
        <!-- Explortaion D-pad controls (shown in explore mode) -->
        <div id="explore-controls" class="controls-group active">
          <div class="dpad">
            <button id="btn-turn-left" class="btn btn-neon btn-dpad" title="左を向く" aria-label="左を向く">◀</button>
            <button id="btn-move-forward" class="btn btn-neon btn-dpad" title="前進" aria-label="前進">▲</button>
            <button id="btn-turn-right" class="btn btn-neon btn-dpad" title="右を向く" aria-label="右を向く">▶</button>
            <div></div>
            <button id="btn-move-backward" class="btn btn-neon btn-dpad" title="後退" aria-label="後退">▼</button>
            <button id="btn-search" class="btn btn-neon btn-dpad" title="調べる" aria-label="調べる">調べる</button>
          </div>
          <div class="action-grid">
            <button id="btn-inspect" class="btn btn-neon btn-action">道具</button>
            <button id="btn-cast" class="btn btn-neon btn-action">呪文</button>
            <button id="btn-item" class="btn btn-neon btn-action">装備</button>
            <button id="btn-run-quests" class="btn btn-neon btn-action">クエスト</button>
          </div>
        </div>

        <!-- Combat controls (shown in combat mode) -->
        <div id="combat-controls" class="controls-group">
          <div id="combat-prompt">行動を選択してください</div>
          <div class="combat-grid">
            <button id="btn-combat-fight" class="btn btn-neon btn-combat">戦う</button>
            <button id="btn-combat-spell" class="btn btn-neon btn-combat">呪文</button>
            <button id="btn-combat-item" class="btn btn-neon btn-combat">道具</button>
            <button id="btn-combat-auto" class="btn btn-neon btn-combat">オート</button>
            <button id="btn-combat-defend" class="btn btn-neon btn-combat">防御</button>
            <button id="btn-combat-run" class="btn btn-neon btn-combat">逃げる</button>
            <button id="btn-combat-cancel" class="btn btn-neon btn-combat">キャンセル</button>
          </div>
        </div>

        <!-- Town controls (shown in town mode) -->
        <div id="town-controls" class="controls-group">
          <div class="town-grid">
            <button id="btn-town-dungeon" class="btn btn-neon btn-town">迷宮に入る</button>
            <button id="btn-town-castle" class="btn btn-neon btn-town">おしろ (記録)</button>
            <button id="btn-town-workshop" class="btn btn-neon btn-town" style="border-color: var(--neon-green); color: var(--neon-green);">工房</button>
            <button id="btn-town-archives" class="btn btn-neon btn-town">書庫 (図鑑・記録)</button>
          </div>
        </div>

        <!-- Camp/Sub-menu controls (shown when in sub-menu) -->
        <div id="submenu-controls" class="controls-group">
          <div id="submenu-title">メニュー</div>
          <div id="submenu-options" class="submenu-grid">
            <!-- Dynamically populated buttons -->
          </div>
          <button id="btn-submenu-back" class="btn btn-danger btn-block">戻る</button>
        </div>

        <!-- Trap controls (shown in trap encounter) -->
        <div id="trap-controls" class="controls-group">
          <div id="trap-info">
            <div id="trap-header">⚠️ 罠に遭遇！</div>
            <div id="trap-details">
              <div id="trap-name">罠名: -</div>
              <div id="trap-status">状態: -</div>
              <div id="trap-difficulty">危険度: -</div>
              <div id="trap-effect">予想効果: -</div>
              <div id="trap-success-rate">解除成功率: -</div>
            </div>
          </div>
          <div class="trap-grid">
            <button id="btn-trap-back" class="btn btn-secondary btn-trap">引き返す</button>
            <button id="btn-trap-bypass" class="btn btn-neon btn-trap">迂回する</button>
            <button id="btn-trap-disarm" class="btn btn-neon btn-trap" style="border-color: var(--neon-cyan); color: var(--neon-cyan);">解除する</button>
            <button id="btn-trap-force" class="btn btn-danger btn-trap">強行突破</button>
          </div>
        </div>
      </div>

      <!-- Solo character HUD (Bottom) -->
      <footer id="character-panel">
        <div id="character-hud"></div>
      </footer>
    </div>

    <!-- Script Entry -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
